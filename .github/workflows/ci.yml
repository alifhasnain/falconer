name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dart:
    name: Dart analyze, format & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  android-unit:
    name: Kotlin unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
      - run: flutter pub get
        working-directory: example
      # settings.gradle.kts requires flutter.sdk from local.properties (gitignored).
      - name: Write local.properties
        working-directory: example/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
      - run: ./gradlew :falconer:testDebugUnitTest
        working-directory: example/android

  android-instrumented:
    name: Instrumented tests (emulator API 34)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
      - run: flutter pub get
        working-directory: example
      # settings.gradle.kts requires flutter.sdk from local.properties (gitignored).
      - name: Write local.properties
        working-directory: example/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          working-directory: example/android
          script: ./gradlew :falconer:connectedDebugAndroidTest

  pana:
    name: pub score (pana)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
      - run: flutter pub get
      - run: dart pub global activate pana
      - run: dart pub global run pana --no-warning --exit-code-threshold 20
